<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life29</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚪%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="dark-background"></div>

    <!-- ① 高斯模糊全屏背景视频 -->
    <div class="blur-bg-container" id="blurBgContainer">
        <video class="blur-video" id="bgvideo0" muted playsinline preload="auto">
            <source src="videos/jinmenbridge.mp4" type="video/mp4">
        </video>
        <video class="blur-video" id="bgvideo1" muted playsinline preload="auto">
            <source src="videos/lego.mp4" type="video/mp4">
        </video>
        <video class="blur-video" id="bgvideo2" muted playsinline preload="auto">
            <source src="videos/flower.mp4" type="video/mp4">
        </video>
        <video class="blur-video" id="bgvideo3" muted playsinline preload="auto">
            <source src="videos/theater.mp4" type="video/mp4">
        </video>
        <video class="blur-video" id="bgvideo4" muted playsinline preload="auto">
            <source src="videos/minisoda.mp4" type="video/mp4">
        </video>
    </div>

    <!-- ② 相机取景器（视频在相机屏幕内播放） -->
    <div class="camera-display" id="cameraDisplay">
        <!-- 屏幕内视频（坐标与PNG透明区域对齐） -->
        <div class="camera-screen-area">
            <video class="screen-video active" id="scrvideo0" muted playsinline preload="auto">
                <source src="videos/jinmenbridge.mp4" type="video/mp4">
            </video>
            <video class="screen-video" id="scrvideo1" muted playsinline preload="auto">
                <source src="videos/lego.mp4" type="video/mp4">
            </video>
            <video class="screen-video" id="scrvideo2" muted playsinline preload="auto">
                <source src="videos/flower.mp4" type="video/mp4">
            </video>
            <video class="screen-video" id="scrvideo3" muted playsinline preload="auto">
                <source src="videos/theater.mp4" type="video/mp4">
            </video>
            <video class="screen-video" id="scrvideo4" muted playsinline preload="auto">
                <source src="videos/minisoda.mp4" type="video/mp4">
            </video>
        </div>

        <!-- 相机边框叠层（屏幕区域镂空透明） -->
        <img src="images/cameraframe_transparent.png" class="camera-frame-img" alt="" draggable="false">

        <!-- 仿相机 HUD 叠层 -->
        <div class="camera-hud">
            <div class="hud-top">
                <span class="hud-rec">● REC</span>
                <span class="hud-time" id="hudTime">00:00</span>
            </div>
            <div class="hud-bottom">
                <span class="hud-date" id="hudDate">00/00/0000</span>
                <span class="hud-label" id="hudLabel">金门大桥</span>
            </div>
        </div>
    </div>

    <!-- 视频名称 - 左下角 -->
    <div class="video-name" id="videoName">金门大桥</div>

    <!-- 底部控制栏 -->
    <div class="bottom-controls">
        <div class="sound-toggle" id="soundToggle" title="BGM">
            <svg class="sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg class="sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </div>

        <div class="random-toggle" id="randomToggle" title="随机切换">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"></path>
            </svg>
        </div>

        <div class="door-logo" id="doorLogo" title="登录">
            <svg viewBox="0 0 100 120" fill="none">
                <path d="M20 15 L20 115 M80 15 L80 115 M20 15 L80 15" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                <path d="M25 20 L25 110 L55 100 L55 30 Z" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <ellipse cx="48" cy="68" rx="3" ry="5" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <!-- 磨砂登录界面 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="close-login" id="closeLogin">
            <svg viewBox="0 0 40 40" fill="none">
                <line x1="12" y1="12" x2="28" y2="28" stroke="white" stroke-width="1.5"/>
                <line x1="28" y1="12" x2="12" y2="28" stroke="white" stroke-width="1.5"/>
            </svg>
        </div>
        <div class="login-container">
            <div class="user-selection">
                <button class="user-btn wiwi" data-user="wiwi">wiwi</button>
                <button class="user-btn yuyu" data-user="yuyu">yuyu</button>
            </div>
            <div class="password-container" id="passwordContainer">
                <div class="pin-dots" id="pinDots">
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                </div>
                <div class="numpad">
                    <button class="num-key" data-num="1">1</button>
                    <button class="num-key" data-num="2">2</button>
                    <button class="num-key" data-num="3">3</button>
                    <button class="num-key" data-num="4">4</button>
                    <button class="num-key" data-num="5">5</button>
                    <button class="num-key" data-num="6">6</button>
                    <button class="num-key" data-num="7">7</button>
                    <button class="num-key" data-num="8">8</button>
                    <button class="num-key" data-num="9">9</button>
                    <button class="num-key clear" data-action="clear">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                            <line x1="18" y1="9" x2="12" y2="15"></line>
                            <line x1="12" y1="9" x2="18" y2="15"></line>
                        </svg>
                    </button>
                    <button class="num-key" data-num="0">0</button>
                    <button class="num-key confirm" data-action="confirm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <audio id="bgmAudio" loop>
        <source src="audio/bgm.mp3" type="audio/mpeg">
    </audio>

    <script src="login.js"></script>
</body>
</html>
