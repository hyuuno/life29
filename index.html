<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life29 - 时光记录</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google API Client -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <!-- 顶部控制栏 -->
        <header class="header">
            <h1 class="site-title">Life29</h1>
            <div class="header-controls">
                <button id="toggleImages" class="toggle-btn" data-state="hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>显示图片</span>
                </button>
                <button id="addPostBtn" class="add-btn" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>添加记录</span>
                </button>
                <div id="signInContainer"></div>
            </div>
        </header>

        <!-- 时间线容器 -->
        <div class="timeline">
            <div class="timeline-line"></div>
            <div id="timelineContent" class="timeline-content">
                <!-- 动态加载内容 -->
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- 添加记录弹窗 -->
    <div id="addPostModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加新记录</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="addPostForm">
                <div class="form-group">
                    <label>用户</label>
                    <select id="userSelect" required>
                        <option value="user1">用户A</option>
                        <option value="user2">用户B</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>时间</label>
                    <input type="datetime-local" id="postTime" required>
                </div>
                
                <div class="form-group">
                    <label>地点（可选）</label>
                    <input type="text" id="postLocation" placeholder="例如：北京、咖啡厅">
                </div>
                
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="postText" rows="4" placeholder="记录你的想法..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>图片（可选，支持 JPG、PNG、GIF）</label>
                    <input type="file" id="postImages" multiple accept="image/*">
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-cancel">取消</button>
                    <button type="submit" class="btn-submit">发布</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 图片灯箱 -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">‹</button>
        <button class="lightbox-next">›</button>
        <img id="lightboxImage" src="" alt="">
        <div class="lightbox-counter"></div>
    </div>

    <!-- 先加载配置 -->
    <script src="config.js"></script>
    <!-- 再加载主脚本 -->
    <script src="script.js"></script>
</body>
</html>
